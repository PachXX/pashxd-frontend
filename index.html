<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Mobile Web App Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PashxD">

    <!-- Bare fallback title only — react-helmet-async's <title> replaces this
         per-page reliably (single-instance tag), but it does NOT remove
         pre-existing static <meta> tags, only ones it rendered itself. A
         static description/og:*/twitter:* block here would sit alongside
         each page's SEOHead output as a duplicate, and browsers/crawlers
         read the FIRST matching tag — meaning every page's real og:type,
         description, and image would be silently shadowed by whatever
         static defaults lived here. Every route already renders its own
         SEOHead (see src/components/SEOHead.jsx and src/pages/Landing.jsx
         for the homepage's), so there's nothing to default to. -->
    <title>PashxD — AI-Powered Industrial OS for Real World Operations</title>

    <!-- Theme Color -->
    <meta name="theme-color" content="#15803D">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png">

    <!-- Google Consent Mode v2 — defaults MUST fire before any Google tag -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage:      'denied',
        ad_storage:             'denied',
        ad_user_data:           'denied',
        ad_personalization:     'denied',
        functionality_storage:  'granted',
        personalization_storage:'granted',
        security_storage:       'granted',
        wait_for_update: 500,
      });
    </script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-310NXQ8H2H"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-310NXQ8H2H');
    </script>

</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
